# =============================================================================
# ARO IntelliJ Plugin - Build & Publish
# =============================================================================
# Manually triggered workflow to build the IntelliJ plugin, upload the
# distribution ZIP as a downloadable artifact, and optionally publish
# to the JetBrains Marketplace.
#
# Required secrets for publishing:
#   JETBRAINS_CERTIFICATE_CHAIN   - Plugin signing certificate chain
#   JETBRAINS_PRIVATE_KEY         - Plugin signing private key
#   JETBRAINS_PRIVATE_KEY_PASSWORD - Private key password
#   JETBRAINS_PUBLISH_TOKEN       - JetBrains Marketplace upload token
# =============================================================================

name: IntelliJ Plugin

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to JetBrains Marketplace'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Build the IntelliJ plugin
  # ===========================================================================
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        working-directory: Editor/intellij-aro
        continue-on-error: true
        run: ./gradlew test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: Editor/intellij-aro/build/reports/tests/test/
          retention-days: 30

      - name: Build plugin
        working-directory: Editor/intellij-aro
        run: ./gradlew buildPlugin

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: aro-intellij-plugin
          path: Editor/intellij-aro/build/distributions/*.zip
          retention-days: 90

  # ===========================================================================
  # Publish to JetBrains Marketplace (only when requested)
  # ===========================================================================
  publish:
    name: Publish Plugin
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ inputs.publish }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Sign and publish plugin
        working-directory: Editor/intellij-aro
        env:
          CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}
        run: |
          if [ -n "$CERTIFICATE_CHAIN" ] && [ -n "$PRIVATE_KEY" ]; then
            ./gradlew signPlugin publishPlugin
          else
            ./gradlew publishPlugin
          fi
